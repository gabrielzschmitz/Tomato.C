# =============================================================================
# Tomato.C — sample configuration
# =============================================================================
# Place this file at:
#   System-wide: /etc/tomato/config.toml
#   User:        $XDG_CONFIG_HOME/tomato/config.toml
#                or $HOME/.config/tomato/config.toml
#
# User config overrides system config; both override built-in defaults.
# Unset values keep their defaults (shown below).

# UI — Icon Sets --------------------------------------------------------------
# Each icon set is a 3-element array: [nerd, emoji, ascii]
[visual.ui.icons.pomodoro]
main_menu     = ["󰍜", "🧾", ""]
work          = ["", "🍅", ""]
short_pause   = ["", "☕", ""]
long_pause    = ["", "🌴", ""]
notes         = ["", "📝", ""]
help          = ["", "⁉️", ""]
continue_icon = ["", "⏯️", ""]
idle          = ["", "🌙", ""]

[visual.ui.icons.input]
default_mode      = ["", "🌐", ""]
normal_mode       = ["", "🧭", ""]
insert_mode       = ["", "✏ ", ""]
visual_mode       = ["󰕢", "🔲", ""]
real_time_module  = ["", "🕘", ""]
line_column_module = ["", "▶", ""]

[visual.ui.icons.misc]
playing              = ["", "▶", "P"]
plus_volume          = ["", "➕", "+"]
minus_volume         = ["", "➖", "-"]
active_volume_bar    = ["█", "█", "█"]
inactive_volume_bar  = ["▒", "▒", "▒"]
active_progress_bar  = ["█", "█", "█"]
inactive_progress_bar = ["▒", "▒", "▒"]
pause                = ["󰏤", "⏸️", "P"]
play                 = ["󰐊", "▶️", "P"]
skip                 = ["󰒬", "⏭️", "S"]
back                 = ["", "⏪", "B"]
visual_cursor        = "█"
insert_cursor        = "▏"
border_chars         = ["┏", "┓", "┗", "┛", "━", "┃"]
history              = ["░░", "▒▒", "▓▓", "██"]
streak_module        = ["󰈸", "🔥", ""]
date_module          = ["", "📅", ""]
weekday_module       = ["", "📌", ""]
terminal_size_module = ["", "📟", ""]
icons_module         = ["", "🎨", ""]

# Visual Settings -------------------------------------------------------------
[visual]
animations           = 1            # 0/1 — enable animations
icons                = "nerd-icons" # "nerd-icons" | "emojis" | "ascii"
bg_transparency      = 1            # 0/1 — transparent background
                                    # (needs transparent term)
status_bar_spacing   = 1            # spaces between status bar modules
status_bar_position  = 0            # 0 = bottom, 1 = top
unfocused_panel_color = 7           # 0-7 (BLACK–WHITE)
focused_panel_color  = 1            # 0-7
clock_24h            = 0            # 0/1 — use 24-hour clock

[visual.status_bar.modules]
# Available modules: InputMode, RealTime, Scene, CurrentStatus, LineColumn,
#                    Streak, Date, Weekday, TerminalSize, Icons
# If unset, defaults to:  left = [InputMode, RealTime], right = [Scene, LineColumn]
left   = ["InputMode", "RealTime"]
center = []
right  = ["Scene", "LineColumn"]

# Notification Settings -------------------------------------------------------
# Requires libnotify on Linux.
[notifications]
enabled      = true   # 0/1
sound        = true   # 0/1 — requires miniaudio (included on external)
sound_volume = 0.5    # 0.0 – 1.0

[notifications.work]
title       = "Work!"
description = "You need to focus"
audio_path  = "./resources/sounds/dfltnotify.mp3"

[notifications.short_pause]
title       = "Pause Break"
description = "You have some time to chill"
audio_path  = "./resources/sounds/pausenotify.mp3"

[notifications.long_pause]
title       = "Long Pause Break"
description = "You have some time to chill"
audio_path  = "./resources/sounds/pausenotify.mp3"

[notifications.end_cycle]
title       = "End of Pomodoro Cycle"
description = "Feel free to start another!"
audio_path  = "./resources/sounds/endnotify.mp3"

# Pomodoro Settings -----------------------------------------------------------
[pomodoro]
amount      = 4       # pomodoros per cycle (1-8)
work_time   = 25      # minutes (5-75, step 5)
short_pause = 5       # minutes (1-10)
long_pause  = 30      # minutes (5-60, step 5)

# Noise / White-Noise Settings ------------------------------------------------
# Requires miniaudio (included on external).
[noise]
enabled       = true  # 0/1
master_volume = 50     # 0-100

[[noise.tracks]]
name           = "Rain"
icons          = ["󰖖", "☔", "R"]
sound_path     = "./resources/sounds/ambience-rain.mp3"
default_volume = 50
sel_color      = 14

[[noise.tracks]]
name           = "Fire"
icons          = ["󰈸", "🔥", "F"]
sound_path     = "./resources/sounds/ambience-fire.mp3"
default_volume = 50
sel_color      = 13

[[noise.tracks]]
name           = "Wind"
icons          = ["󰖝", "🍃", "W"]
sound_path     = "./resources/sounds/ambience-wind.mp3"
default_volume = 50
sel_color      = 15

[[noise.tracks]]
name           = "Thunder"
icons          = ["󱐋", "⚡", "T"]
sound_path     = "./resources/sounds/ambience-thunder.mp3"
default_volume = 50
sel_color      = 11

# Logging Settings ------------------------------------------------------------
# pomodoro_log = $XDG_STATE_HOME/tomato/pomodoro.bin
#                or $HOME/.local/state/tomato/pomodoro.bin
# notes_log    = $XDG_STATE_HOME/tomato/notes.log
#                or $HOME/.local/state/tomato/notes.log
# error_log    = $XDG_STATE_HOME/tomato/errors.log
#                or $HOME/.local/state/tomato/errors.log
# timer_file   = $XDG_RUNTIME_DIR/tomato_timer.sock
#                or same directory as the state logs
[logging]
timer_log     = true     # 0/1 — disable -t flag if off
timerlog_icons = true    # 0/1 — icons in timer log
work_log      = true     # 0/1 — disable resume_from_unfinished_session if off
notepad_log   = true     # 0/1 — save notepad on exit

# Auto-Start Settings ---------------------------------------------------------
# Ask to continue after each work/pause cycle.
[autostart]
work  = true   # 0/1
pause = true   # 0/1

# Misc Settings ---------------------------------------------------------------
[misc]
wsl                             = false # 0/1 — WSL notifications & no noise
fps                             = 120   # target frame rate
max_note_depth                  = 1     # 0-3 — hierarchical sub-note depth
resume_from_unfinished_session  = true  # 0/1 — get resume from unfinished
                                        # session menu at startup
# Keybindings -----------------------------------------------------------------
# Format:
#   [keybindings.MODE.SCENE]
#   ActionName = ["key1", "key2", …]
#
# The action name (as listed in action_map in config.c) is the key, and the
# value is an array of key-name strings that trigger it.
#
# Key names: single printable character, or a named constant:
#   KEY_LEFT  KEY_RIGHT  KEY_UP     KEY_DOWN
#   KEY_ENTER KEY_BACKSPACE  BACKSPACE
#   ENTER     ESC       CTRLR     CTRLW
#   CTRLH     SPACE     CTRLC
#
# MODE:  DEFAULT | NORMAL | INSERT | VISUAL
# SCENE: SCENE_MAIN_MENU | SCENE_WORK_TIME | SCENE_SHORT_PAUSE
#        | SCENE_LONG_PAUSE | SCENE_NOTES | SCENE_HELP
#        | SCENE_CONTINUE | SCENE_NOISE | SCENE_HISTORY_OVERVIEW
#        | SCENE_HISTORY_DAY | SCENE_HISTORY_STATS
#        | SCENE_PREFERENCES | SCENE_PREFS_STEPPER | SCENE_PREFS_SELECT
#        | ALL_SCENES | POMODORO_SCENES
#
# ── How merging works ──
# The built-in defaults always load first.  Each TOML file (system and then
# user) is **merged** into the current binding set:
#
#   • If a TOML entry matches an existing (key, mode, scene) tuple, its
#     action is **overridden**.
#   • If no match exists, a new binding is **appended**.
#
# This means you only need to list the bindings you want to change or add.
# Everything you don't mention stays at its default value.

# DEFAULT mode — ALL_SCENES (general / cross-cutting keys)
[keybindings.DEFAULT.ALL_SCENES]
ChangeSelectedItemLeft  = ["KEY_UP", "k", "KEY_LEFT", "h"]
ChangeSelectedItemRight = ["KEY_DOWN", "j", "KEY_RIGHT", "l"]
ExecuteMenuAction       = ["ENTER", "KEY_ENTER"]
NextPanel               = ["SPACE"]
QuitApp                 = ["q", "ESC", "CTRLC"]
OpenNoiseMenu           = ["CTRLW", "w"]
OpenHistoryPopup        = ["CTRLH"]
GoPrevSlide             = ["KEY_LEFT", "h"]
GoNextSlide             = ["KEY_RIGHT", "l"]
ClosePopup              = ["ENTER", "KEY_ENTER", "q", "ESC", "CTRLC"]
SelectPrevButton        = ["KEY_LEFT", "h"]
SelectNextButton        = ["KEY_RIGHT", "l"]
ExecuteButtonAction     = ["ENTER", "KEY_ENTER"]
OpenHelp                = ["?", "KEY_F(1)"]

# NORMAL mode — NOTES scene (vim-like editing keys)
[keybindings.NORMAL.SCENE_NOTES]
InputCursorLeft       = ["h", "KEY_LEFT"]
InputCursorRight      = ["l", "KEY_RIGHT"]
InputDeleteChar       = ["x"]
InputESC              = ["ESC", "CTRLC"]
InputCommit           = ["ENTER", "KEY_ENTER"]
SwitchToInsertMode    = ["i"]
SwitchToInsertModeAppend = ["a"]
SwitchToVisualMode    = ["v"]
UndoNotes             = ["u"]
RedoNotes             = ["CTRLR"]

# INSERT mode — NOTES scene
[keybindings.INSERT.SCENE_NOTES]
InputCursorLeft       = ["KEY_LEFT"]
InputCursorRight      = ["KEY_RIGHT"]
InputBackspace        = ["KEY_BACKSPACE", "BACKSPACE"]
InputCommit           = ["ENTER", "KEY_ENTER"]
InputESC              = ["ESC", "CTRLC"]
SwitchToVisualMode    = ["v"]

# VISUAL mode — NOTES scene
[keybindings.VISUAL.SCENE_NOTES]
InputCursorLeft          = ["h", "KEY_LEFT"]
InputCursorRight         = ["l", "KEY_RIGHT"]
InputVisualDelete        = ["x"]
InputCommit              = ["ENTER", "KEY_ENTER"]
InputESC                 = ["ESC", "CTRLC"]
InputSwitchToInsertFromVisual = ["a"]
SwitchToInsertMode       = ["i"]

# DEFAULT mode — NOTES scene (note/ task management)
[keybindings.DEFAULT.SCENE_NOTES]
ToggleMoveMode        = ["V"]
MoveNoteDownWrapper   = ["j", "KEY_DOWN"]
MoveNoteUpWrapper     = ["k", "KEY_UP"]
PromoteNoteWrapper    = ["h", "KEY_LEFT"]
DemoteNoteWrapper     = ["l", "KEY_RIGHT"]
DeleteNoteAtNotes     = ["d"]
AddNewTask            = ["t"]
AddNewNote            = ["n"]
AddSubtask            = ["T"]
AddSubnote            = ["N"]
EditCurrentNote       = ["e"]
ExitMoveMode          = ["ENTER"]
ToggleTaskAtNotes     = ["ENTER"]
UndoNotes             = ["u"]
RedoNotes             = ["CTRLR"]
QuitAppNotes          = ["ESC", "CTRLC", "q"]

# DEFAULT mode — Main Menu
[keybindings.DEFAULT.SCENE_MAIN_MENU]
SelectNextItem        = ["KEY_DOWN", "KEY_RIGHT", "j", "l"]
SelectPreviousItem    = ["KEY_UP", "KEY_LEFT", "k", "h"]
ExecuteMenuAction     = ["ENTER"]

# DEFAULT mode — POMODORO_SCENES (timer-scoped overrides)
[keybindings.DEFAULT.POMODORO_SCENES]
SkipPomodoroStep      = ["s"]
TogglePause           = ["p"]
OpenResetMenu         = ["CTRLR"]
ReturnToMainMenu      = ["m"]

# DEFAULT mode — White-Noise dialog
[keybindings.DEFAULT.SCENE_NOISE]
NoiseClose            = ["q", "ESC", "CTRLC"]
NoiseSelectPrev       = ["k", "KEY_UP"]
NoiseSelectNext       = ["j", "KEY_DOWN"]
NoiseTogglePlay       = ["SPACE"]
NoiseVolumeUp         = ["l", "KEY_RIGHT", "+", "="]
NoiseVolumeDown       = ["h", "KEY_LEFT", "-", "_"]
NoiseResetAll         = ["r", "R"]

# DEFAULT mode — Continue dialog
[keybindings.DEFAULT.SCENE_CONTINUE]
SelectNextButton      = ["l", "KEY_RIGHT"]
SelectPrevButton      = ["h", "KEY_LEFT"]
ExecuteButtonAction   = ["ENTER", "KEY_ENTER"]
ClosePopup            = ["q", "ESC", "CTRLC"]

# DEFAULT mode — History Overview
[keybindings.DEFAULT.SCENE_HISTORY_OVERVIEW]
HistoryCursorLeft     = ["h", "KEY_LEFT"]
HistoryCursorRight    = ["l", "KEY_RIGHT"]
HistoryCursorDown     = ["j", "KEY_DOWN"]
HistoryCursorUp       = ["k", "KEY_UP"]
HistoryOpenDayDetail  = ["ENTER", "KEY_ENTER"]
ClosePopup            = ["q", "ESC", "CTRLC"]

# DEFAULT mode — History Day Detail
[keybindings.DEFAULT.SCENE_HISTORY_DAY]
HistoryScrollDown     = ["j", "KEY_DOWN"]
HistoryScrollUp       = ["k", "KEY_UP"]
HistoryCloseToOverview = ["ENTER", "KEY_ENTER", "ESC", "CTRLC", "q"]

# DEFAULT mode — History Statistics
[keybindings.DEFAULT.SCENE_HISTORY_STATS]
HistoryCloseToOverview = ["ESC", "CTRLC", "q"]

# DEFAULT mode — Preferences dialog
[keybindings.DEFAULT.SCENE_PREFERENCES]
PrefsSelectPrev       = ["KEY_UP", "k"]
PrefsSelectNext       = ["KEY_DOWN", "j"]
PrefsScrollUp         = ["u"]
PrefsScrollDown       = ["d"]
PrefsValueDown        = ["KEY_LEFT", "h"]
PrefsValueUp          = ["KEY_RIGHT", "l"]
PrefsToggle           = ["SPACE"]
PrefsEdit             = ["ENTER", "KEY_ENTER"]
PrefsBack             = ["q", "ESC", "CTRLC"]

# DEFAULT mode — Preferences stepper sub-dialog
[keybindings.DEFAULT.SCENE_PREFS_STEPPER]
StepperDecrement      = ["h", "KEY_LEFT"]
StepperIncrement      = ["l", "KEY_RIGHT"]
PrefsPreview          = ["p"]
StepperClose          = ["ENTER", "KEY_ENTER", "q", "ESC", "CTRLC"]

# DEFAULT mode — Preferences select sub-dialog
[keybindings.DEFAULT.SCENE_PREFS_SELECT]
SelectPrevOption      = ["k", "KEY_UP"]
SelectNextOption      = ["j", "KEY_DOWN"]
PrefsPreview          = ["p"]
SelectApply           = ["ENTER", "KEY_ENTER"]
SelectCancel          = ["q", "ESC", "CTRLC"]
