#/**
# * @file .github/workflows/build-test.yaml
# * @brief CI workflow to verify that Tomato.C compiles successfully on
# *        Ubuntu and macOS without running the test suites.
# *
# * Runs on every push and pull_request. A separate workflow (tests.yaml)
# * handles the actual test execution.
# *
# * Jobs:
# *   ubuntu-build-test       — build on ubuntu-latest with GCC
# *   macos-intel-build-test  — build on macos-15-intel (Intel) with Clang
# *   macos-arm-build-test    — build on macos-latest (ARM) with Clang
# */

name: Build
on:
  - push
  - pull_request
jobs:
  #/**
  # * Installs build-essential, pkg-config, ncursesw (wide-char), and
  # * libnotify (desktop notifications).  No mpv/libmpv is needed
  # * because audio is handled by the vendored miniaudio library.
  # */
  ubuntu-build-test:
    name: Build project (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config \
            libncursesw5-dev libnotify-dev
      - name: Build project
        run: ./build.sh

  #/**
  # * Build on macOS (Intel x86_64).
  # * Only ncurses is installed via Homebrew — libnotify is not
  # * available on macOS and pkg-config is not required by the
  # * Apple-specific code path in config.mk.
  # */
  macos-intel-build-test:
    name: Build project (macOS Intel)
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: brew install ncurses
      - name: Build project
        run: ./build.sh

  #/**
  # * Build on macOS (Apple Silicon ARM64).
  # * Same dependencies as the Intel build — ncurses via Homebrew.
  # */
  macos-arm-build-test:
    name: Build project (macOS ARM)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: brew install ncurses
      - name: Build project
        run: ./build.sh
